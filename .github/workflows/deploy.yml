name: Build & Deploy to FTP

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy Frontend (dist) to FTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "tagihan@xcuanmember.com,$FTP_PASS" ftp.xcuanmember.com <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mirror -R --no-perms --delete --parallel=4 ./frontend/dist/ /
          quit
          EOF

      - name: Deploy API to FTP
        env:
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          lftp -u "tagihan@xcuanmember.com,$FTP_PASS" ftp.xcuanmember.com <<'EOF'
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate false
          set ftp:passive-mode true
          set net:timeout 30
          set net:max-retries 3
          mirror -R --no-perms --delete --parallel=4 ./api/ /api/
          quit
          EOF
