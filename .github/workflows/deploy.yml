name: Build & Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H xcuanmember.com >> ~/.ssh/known_hosts

      - name: Deploy Frontend (dist) ke server
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./frontend/dist/ \
            xcuanmember@xcuanmember.com:/home/xcuanmember/public_html/tagihan/

      - name: Deploy API ke server
        run: |
          rsync -avz --delete \
            --exclude 'config.php' \
            --exclude 'uploads/' \
            -e "ssh -i ~/.ssh/deploy_key -p 22" \
            ./api/ \
            xcuanmember@xcuanmember.com:/home/xcuanmember/public_html/tagihan/api/
